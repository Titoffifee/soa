version: "3.9"

services:

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: cinema-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093,2@kafka2:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka2:
    image: confluentinc/cp-kafka:7.6.1
    container_name: cinema-kafka2
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka2:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093,2@kafka2:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka2-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1
    container_name: cinema-schema-registry
    depends_on:
      kafka:
        condition: service_healthy
      kafka2:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092,kafka2:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  kafka-init:
    build:
      context: ./kafka-setup
    container_name: cinema-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
      kafka2:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    environment:
      KAFKA_BROKER: kafka:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      SCHEMA_PATH: /schemas/movie_event.avsc
    volumes:
      - ./kafka-setup/movie_event.avsc:/schemas/movie_event.avsc:ro
    restart: on-failure

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: cinema-clickhouse
    depends_on:
      kafka:
        condition: service_healthy
      kafka2:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    environment:
      CLICKHOUSE_DB: cinema
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - ./clickhouse/create_db.sql:/docker-entrypoint-initdb.d/01_create_db.sql:ro
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/02_init.sql:ro
      - ./clickhouse/03_daily_active_users.sql:/docker-entrypoint-initdb.d/03_daily_active_users.sql:ro
      - ./clickhouse/04_average_watch_time.sql:/docker-entrypoint-initdb.d/04_average_watch_time.sql:ro
      - ./clickhouse/05_top_movies.sql:/docker-entrypoint-initdb.d/05_top_movies.sql:ro
      - ./clickhouse/06_conversion.sql:/docker-entrypoint-initdb.d/06_conversion.sql:ro
      - ./clickhouse/07_retention.sql:/docker-entrypoint-initdb.d/07_retention.sql:ro
      - clickhouse-data:/var/lib/clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  postgres:
    image: postgres:16
    container_name: cinema-postgres
    environment:
      POSTGRES_DB: cinema
      POSTGRES_USER: cinema
      POSTGRES_PASSWORD: cinema
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cinema -d cinema"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  minio:
    image: minio/minio:latest
    container_name: cinema-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    ports:
      - "9002:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  producer:
    build:
      context: ./producer
    container_name: cinema-producer
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      schema-registry:
        condition: service_healthy
    environment:
      KAFKA_BROKER: kafka:9092
      KAFKA_TOPIC: movie-events
      KAFKA_ACKS: "all"
      KAFKA_RETRIES: "5"
      KAFKA_RETRY_BACKOFF_MS: "500"
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      SCHEMA_PATH: /schemas/movie_event.avsc
      GENERATOR_DEFAULT_SESSIONS: "10"
      GENERATOR_DEFAULT_DELAY_MS: "100"
      HOST: "0.0.0.0"
      PORT: "8000"
    volumes:
      - ./kafka-setup/movie_event.avsc:/schemas/movie_event.avsc:ro
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 60s

  aggregation:
    build:
      context: ./aggregation
    container_name: cinema-aggregation
    depends_on:
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_DATABASE: cinema
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DATABASE: cinema
      POSTGRES_USER: cinema
      POSTGRES_PASSWORD: cinema
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: movie-analytics
      SCHEDULE_INTERVAL_SECONDS: "3600"
      HOST: "0.0.0.0"
      PORT: "8001"
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 60s

  tests:
    build:
      context: ./tests
    container_name: cinema-tests
    depends_on:
      producer:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      PRODUCER_URL: http://producer:8000
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_DB: cinema
    profiles:
      - test

volumes:
  kafka-data:
  kafka2-data:
  clickhouse-data:
  postgres-data:
  minio-data:
